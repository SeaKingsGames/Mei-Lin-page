  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #0d0014;
      --bg: #0a0010;
      --accent: #c77dff;
      --accent2: #ff6b9d;
      --glow: #9b5de5;
      --text: #ede7f6;
      --muted: #b39ddb;
      --card-bg: rgba(255,255,255,0.04);
      --card-border: rgba(199,125,255,0.18);
    }

    html, body {
      min-height: 100%;
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }

    /* ── Animated background ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(155,93,229,0.35) 0%, transparent 65%),
        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(255,107,157,0.18) 0%, transparent 60%),
        radial-gradient(ellipse 50% 50% at 20% 90%, rgba(90,24,154,0.25) 0%, transparent 60%);
      z-index: 0;
      pointer-events: none;
    }

    /* Floating orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.25;
      animation: drift 12s ease-in-out infinite;
      pointer-events: none;
      z-index: 0;
    }
    .orb-1 { width: 300px; height: 300px; background: #9b5de5; top: -60px; left: -80px; animation-delay: 0s; }
    .orb-2 { width: 200px; height: 200px; background: #ff6b9d; bottom: 5%; right: -40px; animation-delay: -5s; }
    .orb-3 { width: 150px; height: 150px; background: #c77dff; top: 45%; left: 10%; animation-delay: -8s; }

    @keyframes drift {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33%       { transform: translate(20px, -30px) scale(1.05); }
      66%       { transform: translate(-15px, 20px) scale(0.95); }
    }

    /* ── Page wrapper ── */
    .page {
      position: relative;
      z-index: 1;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 20px 60px;
      gap: 0;
    }

    /* ── Ad banner top ── */
    .ad-top {
      width: 100%;
      max-width: 340px;
      display: flex;
      justify-content: center;
      margin-bottom: 32px;
      min-height: 50px;
    }

    /* ── Avatar ── */
    .avatar-wrap {
      position: relative;
      margin-bottom: 20px;
      animation: fadeDown 0.7s ease both;
    }
    .avatar-ring {
      width: 104px; height: 104px;
      border-radius: 50%;
      padding: 3px;
      background: linear-gradient(135deg, #c77dff, #ff6b9d, #9b5de5);
      box-shadow: 0 0 32px rgba(155,93,229,0.5), 0 0 64px rgba(199,125,255,0.2);
    }
    .avatar-ring img {
      width: 100%; height: 100%;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      background: #1a0030;
    }
    /* Fallback initials avatar */
    .avatar-fallback {
      width: 100%; height: 100%;
      border-radius: 50%;
      background: linear-gradient(135deg, #2d0060, #6b0080);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      color: var(--accent);
      letter-spacing: 2px;
    }
    .pulse-dot {
      position: absolute;
      bottom: 6px; right: 6px;
      width: 14px; height: 14px;
      background: #4cef9a;
      border-radius: 50%;
      border: 2px solid var(--bg);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(76,239,154,0.5); }
      50%       { box-shadow: 0 0 0 6px rgba(76,239,154,0); }
    }

    /* ── Name & bio ── */
    .handle {
      font-family: 'Playfair Display', serif;
      font-size: 1.65rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      background: linear-gradient(90deg, #c77dff, #ff6b9d);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: fadeDown 0.7s 0.1s ease both;
    }
    .bio {
      margin-top: 8px;
      font-size: 0.88rem;
      color: var(--muted);
      text-align: center;
      max-width: 260px;
      line-height: 1.5;
      animation: fadeDown 0.7s 0.15s ease both;
    }

    /* ── Social icons ── */
    .socials {
      display: flex;
      gap: 18px;
      margin: 18px 0 28px;
      animation: fadeDown 0.7s 0.2s ease both;
    }
    .soc-btn {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      display: flex; align-items: center; justify-content: center;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
      backdrop-filter: blur(8px);
    }
    .soc-btn:hover {
      transform: translateY(-3px) scale(1.1);
      box-shadow: 0 0 16px rgba(199,125,255,0.4);
      border-color: var(--accent);
    }
    .soc-btn svg { width: 18px; height: 18px; fill: var(--muted); transition: fill 0.2s; }
    .soc-btn:hover svg { fill: var(--accent); }

    /* ── Section label ── */
    .section-label {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 10px 0 10px;
      opacity: 0.7;
      align-self: flex-start;
      max-width: 340px;
      width: 100%;
    }

    /* ── Link cards ── */
    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      max-width: 340px;
    }

    .link-card {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 18px;
      border-radius: 14px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      text-decoration: none;
      color: var(--text);
      backdrop-filter: blur(10px);
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease, background 0.2s ease;
      animation: fadeUp 0.5s ease both;
      position: relative;
      overflow: hidden;
    }
    .link-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, rgba(199,125,255,0.06), rgba(255,107,157,0.04));
      opacity: 0;
      transition: opacity 0.25s;
    }
    .link-card:hover {
      transform: translateY(-2px) scale(1.01);
      box-shadow: 0 8px 32px rgba(155,93,229,0.25), 0 0 0 1px rgba(199,125,255,0.3);
      border-color: rgba(199,125,255,0.4);
    }
    .link-card:hover::before { opacity: 1; }

    .card-icon {
      width: 44px; height: 44px; border-radius: 10px;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem;
    }
    .card-icon.kofi   { background: linear-gradient(135deg, #1a0040, #3d007a); }
    .card-icon.fanvue { background: linear-gradient(135deg, #1a0020, #6b003a); }
    .card-icon.fb     { background: linear-gradient(135deg, #001040, #003090); }

    .card-text { flex: 1; }
    .card-title {
      font-size: 0.92rem;
      font-weight: 500;
      color: var(--text);
    }
    .card-sub {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 1px;
    }

    .card-arrow {
      color: var(--muted);
      font-size: 1rem;
      transition: transform 0.2s, color 0.2s;
    }
    .link-card:hover .card-arrow { transform: translateX(3px); color: var(--accent); }

    /* ── Featured badge ── */
    .badge {
      position: absolute;
      top: 8px; right: 42px;
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: linear-gradient(90deg, #9b5de5, #ff6b9d);
      padding: 2px 7px;
      border-radius: 20px;
      color: #fff;
      font-weight: 600;
    }

    /* ── Ad mid ── */
    .ad-mid {
      width: 100%;
      max-width: 340px;
      display: flex;
      justify-content: center;
      margin: 20px 0;
      min-height: 250px;
    }

    /* ── Ad bottom banner ── */
    .ad-bottom {
      width: 100%;
      max-width: 740px;
      display: flex;
      justify-content: center;
      margin-top: 24px;
      min-height: 90px;
    }

    /* ── Footer ── */
    .footer {
      margin-top: 36px;
      font-size: 0.7rem;
      color: rgba(179,157,219,0.4);
      text-align: center;
    }

    /* ── Animations ── */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .link-card:nth-child(1) { animation-delay: 0.25s; }
    .link-card:nth-child(2) { animation-delay: 0.35s; }
    .link-card:nth-child(3) { animation-delay: 0.45s; }
  </style>
</head>
